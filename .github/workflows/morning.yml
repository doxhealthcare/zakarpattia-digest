name: Zakarpattia morning

on:
  workflow_dispatch:        # manual only; scheduled runs disabled (posting runs from server 104.248.35.90)

jobs:
  morning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python morning.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
