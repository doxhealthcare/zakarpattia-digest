name: Zakarpattia morning

on:
  schedule:
    - cron: "0 6 * * *"   # 09:00 Київ (літо, UTC+3)
    - cron: "0 7 * * *"   # 09:00 Київ (зима, UTC+2)
  workflow_dispatch:

jobs:
  morning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # без pip — morning.py тепер лише стандартна бібліотека (курс/погода/бензин — безкоштовні джерела)
      - run: python morning.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
