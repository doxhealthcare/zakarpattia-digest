name: Zakarpattia digest

on:
  workflow_dispatch:        # manual only; scheduled runs disabled (posting runs from server 104.248.35.90)

jobs:Disable scheduled runs - posting moved to server cron
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python digest.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CLAUDE_MODEL: claude-haiku-4-5
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
